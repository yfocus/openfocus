{% extends "base.html" %}
{% block content %}
  <h1>Plan 模式创建目标</h1>
  <div class="muted">由 agent 引导澄清真实目的、识别冲突/关系，并拆解为 tasks。</div>

  {% if error %}
    <div class="card" style="border-color:#ef4444;">
      <strong>无法启动 Plan 模式：</strong>
      <div class="muted" style="margin-top:6px; white-space: pre-wrap;">{{ error }}</div>
    </div>
  {% endif %}

  <div class="card">
    <form method="post" action="/goals/plan/start">
      <div style="margin-bottom: 10px;">
        <label>初始目标（草稿）</label>
        <textarea name="draft_content" rows="4" placeholder="例如：做一个本地部署的注意力 OS，先把 goal/task/事件跑通" required></textarea>
      </div>
      <div class="row">
        <div>
          <label>完成时间</label>
          <input type="date" name="due_date" value="{{ default_due }}" required />
        </div>
        <div style="display:flex; align-items:end; justify-content:flex-end;">
          <button type="submit">开始澄清</button>
        </div>
      </div>
    </form>
  </div>

  <div class="card">
    <a href="/goals">返回目标列表（手动模式）</a>
  </div>
{% endblock %}
