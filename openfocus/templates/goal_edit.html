{% extends "base.html" %}
{% block content %}
  <div style="margin-top: 14px;" class="panel pad">
    <div class="k">编辑目标</div>
    <div class="muted" style="margin-top: 8px;">Goal 是你的北极星：尽量写清楚“为什么重要 / 成功标准 / 边界”。</div>

    <div class="divider"></div>

    <form method="post" action="/goals/{{ goal.id }}/edit">
      <div style="margin-bottom: 10px;">
        <label class="muted">目标内容</label>
        <textarea name="content" rows="4" required>{{ goal.content }}</textarea>
      </div>
      <div style="margin-bottom: 10px;">
        <label class="muted">描述</label>
        <textarea name="description" rows="3" required>{{ goal.description }}</textarea>
      </div>
      <div class="row">
        <div>
          <label class="muted">完成时间（DDL）</label>
          <input type="date" name="due_date" value="{{ goal.due_date }}" required />
        </div>
        <div>
          <label class="muted">状态</label>
          <input name="status" value="{{ goal.status }}" placeholder="active/done/paused" />
        </div>
      </div>
      <div class="row" style="margin-top: 10px;">
        <div>
          <label class="muted">优先级</label>
          <input name="priority" value="{{ goal.priority }}" placeholder="urgent/normal" />
        </div>
        <div>
          <label class="muted">重要程度</label>
          <input name="importance" value="{{ goal.importance }}" placeholder="very_important/normal" />
        </div>
      </div>
      <div style="margin-top: 12px; display:flex; justify-content:flex-end; gap: 10px; flex-wrap:wrap;">
        <a href="/goals?goal={{ goal.id }}" class="btn-ghost" role="button" style="align-self:center;">返回 Dashboard</a>
        <button type="submit">保存</button>
      </div>
    </form>
  </div>
{% endblock %}
