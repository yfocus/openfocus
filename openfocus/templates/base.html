<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "OpenFocus" }}</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial; margin: 24px; }
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .nav { margin-bottom: 16px; }
      .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; margin: 12px 0; }
      .muted { color: #6b7280; }
      input, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; }
      button { padding: 10px 14px; border: 0; border-radius: 8px; background: #111827; color: white; cursor: pointer; }
      button:hover { background: #0b1220; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      @media (max-width: 800px) { .row { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="nav">
      <a href="/goals">目标</a>
    </div>

    {% block content %}{% endblock %}
  </body>
</html>
