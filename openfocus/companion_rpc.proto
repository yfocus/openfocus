syntax = "proto3";

package openfocus.companion.v1;

// CompanionControl 是 OpenFocus(Control Plane) 与 Companion(Data Plane) 的控制通道。
//
// - Companion 作为客户端发起连接（更易穿透 NAT/防火墙）
// - 双向流同时承载：注册(hello)、心跳(ping/pong)、命令与结果

message Hello {
  string device_id = 1;
  string name = 2;
  repeated string capabilities = 3;

  // Companion 本地持久化的配对 token（若已有）。用于重连时快速恢复 active。
  string auth_token = 4;

  // OpenFocus 侧为该 Companion 分配的稳定 ID（服务端生成）。
  // Companion 首次连接时可为空/0；OpenFocus 会通过 Welcome 下发分配结果。
  int64 server_companion_id = 5;
}

message Welcome {
  int64 companion_id = 1;
}

message Ping {
  int64 ts_unix_ms = 1;
}

message Pong {
  int64 ts_unix_ms = 1;
  int64 ping_ts_unix_ms = 2;
}

message PairRequest {
  string request_id = 1;
  string code = 2;
}

message PairingCodeRequest {
  string request_id = 1;
  bool force_new = 2;
}

message PairingCodeResponse {
  string request_id = 1;
  bool ok = 2;
  string code = 3;
  string expires_at = 4;
  string error = 5;
}

message PairResponse {
  string request_id = 1;
  bool ok = 2;
  string auth_token = 3;
  string error = 4;
}

message ChooseDirectoryRequest {
  string request_id = 1;
}

message ChooseDirectoryResponse {
  string request_id = 1;
  bool ok = 2;
  string path = 3;
  string error = 4;
}

message FileEntry {
  string name = 1;
  string rel_path = 2;
  string kind = 3; // file/dir
  int64 size = 4;
  double mtime = 5;
}

message FilesListRequest {
  string request_id = 1;
  string root_path = 2;
  string rel_path = 3;
}

message FilesListResponse {
  string request_id = 1;
  bool ok = 2;
  string path = 3;
  repeated FileEntry entries = 4;
  string error = 5;
}

message FilesReadRequest {
  string request_id = 1;
  string root_path = 2;
  string rel_path = 3;
  int64 max_bytes = 4;
}

message FilesReadResponse {
  string request_id = 1;
  bool ok = 2;
  string path = 3;
  string content = 4;
  bool truncated = 5;
  string mime = 6;
  string error = 7;
}

message FilesRawRequest {
  string request_id = 1;
  string root_path = 2;
  string rel_path = 3;
  int64 max_bytes = 4;
}

message FilesRawResponse {
  string request_id = 1;
  bool ok = 2;
  string path = 3;
  bytes data = 4;
  string mime = 5;
  string error = 6;
}

// Agent 管理（AgentSpace 的 AGENT 栏）。

message AgentSessionInfo {
  string session_id = 1;
  string agent_type = 2;
  string root_path = 3;
  string task_public_id = 4;
  double created_at = 5;
}

message AgentStartRequest {
  string request_id = 1;
  string session_id = 2;
  string root_path = 3;
  string agent_type = 4;
  string task_public_id = 5;
}

message AgentStartResponse {
  string request_id = 1;
  bool ok = 2;
  string session_id = 3;
  string error = 4;
}

message AgentTerminateRequest {
  string request_id = 1;
  string session_id = 2;
}

message AgentTerminateResponse {
  string request_id = 1;
  bool ok = 2;
  string error = 3;
}

message AgentSendRequest {
  string request_id = 1;
  string session_id = 2;
  string prompt = 3; // OpenFocus 已注入后的完整 prompt
}

message AgentSendResponse {
  string request_id = 1;
  bool ok = 2;
  string error = 3;
}

message AgentChunk {
  string request_id = 1;
  string session_id = 2;
  bool ok = 3;
  string text = 4;
  bool done = 5;
  string error = 6;
}

message AgentListSessionsRequest {
  string request_id = 1;
}

message AgentListSessionsResponse {
  string request_id = 1;
  bool ok = 2;
  repeated AgentSessionInfo sessions = 3;
  string error = 4;
}

// Remote Terminal（AgentSpace 的 AGENT 栏替换为远程终端）

message TerminalSessionInfo {
  string terminal_id = 1;
  string root_path = 2;
  double created_at = 3;
}

message TerminalStartRequest {
  string request_id = 1;
  string terminal_id = 2;
  string root_path = 3;
  string base_path = 4;
}

message TerminalStartResponse {
  string request_id = 1;
  bool ok = 2;
  string terminal_id = 3;
  string error = 4;
  string backend = 5;
  string connect_url = 6;
}

message TerminalStopRequest {
  string request_id = 1;
  string terminal_id = 2;
}

message TerminalStopResponse {
  string request_id = 1;
  bool ok = 2;
  string error = 3;
}

message TerminalInputRequest {
  string request_id = 1;
  string terminal_id = 2;
  bytes data = 3;
}

message TerminalInputResponse {
  string request_id = 1;
  bool ok = 2;
  string error = 3;
}

message TerminalResizeRequest {
  string request_id = 1;
  string terminal_id = 2;
  int32 cols = 3;
  int32 rows = 4;
}

message TerminalResizeResponse {
  string request_id = 1;
  bool ok = 2;
  string error = 3;
}

message TerminalMouseModeRequest {
  string request_id = 1;
  string terminal_id = 2;
  // true means scroll: let tmux handle wheel/copy-mode scrolling.
  // false means copy: keep browser-native drag selection friendly.
  bool enabled = 3;
}

message TerminalMouseModeResponse {
  string request_id = 1;
  bool ok = 2;
  string error = 3;
  bool enabled = 4;
}

message TerminalOutput {
  string terminal_id = 1;
  bytes data = 2;
  bool closed = 3;
  string error = 4;
}

message TerminalListSessionsRequest {
  string request_id = 1;
}

message TerminalListSessionsResponse {
  string request_id = 1;
  bool ok = 2;
  repeated TerminalSessionInfo sessions = 3;
  string error = 4;
}

message ServerToClient {
  oneof msg {
    Welcome welcome = 10;
    Ping ping = 1;
    PairingCodeRequest pairing_code = 4;
    PairRequest pair = 2;
    ChooseDirectoryRequest choose_directory = 3;
    FilesListRequest files_list = 11;
    FilesReadRequest files_read = 12;
    FilesRawRequest files_raw = 13;

    AgentStartRequest agent_start = 20;
    AgentTerminateRequest agent_terminate = 21;
    AgentSendRequest agent_send = 22;
    AgentListSessionsRequest agent_list_sessions = 23;

    TerminalStartRequest terminal_start = 30;
    TerminalStopRequest terminal_stop = 31;
    TerminalInputRequest terminal_input = 32;
    TerminalResizeRequest terminal_resize = 33;
    TerminalListSessionsRequest terminal_list_sessions = 34;
    TerminalMouseModeRequest terminal_mouse_mode = 35;
  }
}

message ClientToServer {
  oneof msg {
    Hello hello = 1;
    Pong pong = 2;
    PairingCodeResponse pairing_code_resp = 5;
    PairResponse pair_resp = 3;
    ChooseDirectoryResponse choose_directory_resp = 4;
    FilesListResponse files_list_resp = 11;
    FilesReadResponse files_read_resp = 12;
    FilesRawResponse files_raw_resp = 13;

    AgentStartResponse agent_start_resp = 20;
    AgentTerminateResponse agent_terminate_resp = 21;
    AgentSendResponse agent_send_resp = 22;
    AgentChunk agent_chunk = 23;
    AgentListSessionsResponse agent_list_sessions_resp = 24;

    TerminalStartResponse terminal_start_resp = 30;
    TerminalStopResponse terminal_stop_resp = 31;
    TerminalInputResponse terminal_input_resp = 32;
    TerminalResizeResponse terminal_resize_resp = 33;
    TerminalOutput terminal_output = 34;
    TerminalListSessionsResponse terminal_list_sessions_resp = 35;
    TerminalMouseModeResponse terminal_mouse_mode_resp = 36;
  }
}

service CompanionControl {
  rpc Connect(stream ClientToServer) returns (stream ServerToClient);
}
